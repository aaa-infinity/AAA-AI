name: Deploy Worker

# Auto-deploys the Cloudflare Worker whenever server code changes on main.
on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Syntax check
        run: node --check src/index.js

      - name: Deploy to Cloudflare
        run: npx -y wrangler@3 deploy
        env:
          # Add these in the repo: Settings -> Secrets and variables -> Actions
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Apply D1 migrations
        # The app's points/premium/referrals depend on these tables existing.
        run: npx -y wrangler@3 d1 migrations apply aaa_db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
