name: Build & Release APK

# Builds a signed release APK whenever app code changes on main, and attaches
# it to a GitHub Release (also pushed to the Worker's R2 by the release script
# if Cloudflare secrets are present). Trigger: push to main touching app/**, or
# a published GitHub Release, or manual dispatch.

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "gradle/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - ".github/workflows/build-apk.yml"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      changelog:
        description: "Changelog for this build"
        required: false
        default: "Automated build."

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BUILD_TDLIB: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK (for optional TDLib build)
        if: ${{ env.BUILD_TDLIB == 'true' }}
        run: $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;25.1.8937393" || true
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Decode signing keystore
        # Store a base64 of your release keystore as a repo secret: SIGNING_KEY
        if: ${{ env.SIGNING_KEY != '' }}
        run: |
          echo "$SIGNING_KEY" | base64 -d > app/aaa-ai-release.keystore
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}

      - name: Write local.properties (signing + sdk)
        run: |
          echo "sdk.dir=$ANDROID_HOME" >> local.properties
          echo "RELEASE_STORE_FILE=aaa-ai-release.keystore" >> local.properties
          echo "RELEASE_STORE_PASSWORD=${{ secrets.RELEASE_STORE_PASSWORD }}" >> local.properties
          echo "RELEASE_KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }}" >> local.properties
          echo "RELEASE_KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }}" >> local.properties
          echo "ADMOB_APP_ID=${{ secrets.ADMOB_APP_ID }}" >> local.properties
          echo "APP_SHARED_SECRET=${{ secrets.APP_SHARED_SECRET }}" >> local.properties
          echo "TG_API_ID=${{ secrets.TG_API_ID }}" >> local.properties
          echo "TG_API_HASH=${{ secrets.TG_API_HASH }}" >> local.properties

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Optional: build the TDLib native AAR from source so the "Telegram User
      # Account" login feature is enabled. This is heavy (NDK + cmake) and may
      # take ~15 min; if it fails for any reason we skip it and the app still
      # builds (the user-login button is simply hidden). The resulting AAR is
      # placed at app/libs/tdlib.aar which the app build picks up automatically.
      - name: Set up Android NDK
        if: ${{ env.BUILD_TDLIB == 'true' }}
        run: echo "ndk.dir=$ANDROID_HOME/ndk/25.1.8937393" >> local.properties
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Build TDLib AAR from source (optional)
        if: ${{ env.BUILD_TDLIB == 'true' }}
        continue-on-error: true
        run: |
          git clone --depth 1 --branch v1.8.25 https://github.com/tdlib/tdlib.git /tmp/tdlib
          cd /tmp/tdlib/example/android
          # Point the sample at our local.properties sdk/ndk
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "ndk.dir=$ANDROID_HOME/ndk/25.1.8937393" >> local.properties
          ../gradlew assembleRelease || ../gradlew assembleDebug
          AAR=$(find . -name "tdlib*.aar" | head -1)
          if [ -n "$AAR" ]; then mkdir -p ${{ github.workspace }}/app/libs && cp "$AAR" ${{ github.workspace }}/app/libs/tdlib.aar && echo "TDLIB AAR ready"; fi
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Build signed release APK
        run: ./gradlew :app:assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: aaa-ai-release-apk
          path: app/build/outputs/apk/release/*.apk

      - name: Attach APK to GitHub Release
        if: ${{ github.event_name == 'release' }}
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk

      # Optional: also publish to the Worker's R2 so existing installs auto-update.
      - name: Publish APK to R2 (release script)
        if: ${{ github.event_name == 'release' && env.CLOUDFLARE_API_TOKEN != '' }}
        working-directory: server
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CHANGELOG: ${{ github.event.release.body || inputs.changelog }}
        run: bash ../scripts/release-apk.sh
