name = "aaa-ai-bot"
main = "src/index.js"
account_id = "0990a77a6f54b26e433668dc215320fb"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Observability: logs + traces (free tier).
observability = { enabled = true }

# KV (link codes) — id filled by deploy.
kv_namespaces = [
  { binding = "AAA_KV", id = "631dab0fc15e41a08abf896ae55af5a5" }
]

# D1 database (points + history). Created via: wrangler d1 create aaa_db
d1_databases = [
  { binding = "AAA_DB", database_name = "aaa_db", database_id = "b5be290f-6416-44ac-af92-07e76b7d33ed" }
]

# R2 bucket (S3-compatible object storage for generated images/text).
r2_buckets = [
  { binding = "aaa_assets", bucket_name = "aaa-assets" }
]

# Cron: daily cleanup of stale D1 history + expired R2 objects.
[triggers]
crons = ["0 3 * * *"]

# Tail Worker (requires Workers Paid plan to connect).
# Wire this up once you add a Workers Paid subscription:
# tail_consumers = [
#   { service = "aaa-ai-bot-tail" }
# ]
